name: Build production binaries with EAS

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

jobs:
  check-for-changes:
    name: Check for repository changes since last run
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine if repo changed in the last 24 hours
        id: check
        run: |
          LAST_COMMIT=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          AGE=$((NOW - LAST_COMMIT))
          SECONDS_IN_DAY=86400
          if [ "$AGE" -le "$SECONDS_IN_DAY" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Repository changed within the last 24 hours; will build."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in the last 24 hours; skipping build."
          fi

  eas:
    name: EAS Build (${{ matrix.platform }})
    needs: check-for-changes
    if: (needs.check-for-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch') && (vars.USE_EAS_BUILDS == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [ios, android]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate Expo config
        run: npx expo config --type public

      - name: Build ${{ matrix.platform }} app with EAS
        run: eas build --platform ${{ matrix.platform }} --non-interactive --no-wait
