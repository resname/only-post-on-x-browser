name: Build production binaries with EAS

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

jobs:
  check-for-changes:
    name: Check for repository changes since last run
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine if repo source changed in the last 24 hours
        id: check
        run: |
          # Ignore automated version/metadata files and the remote allowlist. The
          # allowlist is fetched dynamically, so allowlist-only edits must not rebuild.
          RECENT_SOURCE_COMMITS=$(git log --since='24 hours ago' --format=%H -- . \
            ':!version.json' \
            ':!app.json' \
            ':!package.json' \
            ':!url-whitelist.json' \
            ':!src/whitelist/whitelist.json' \
            | wc -l)
          if [ "$RECENT_SOURCE_COMMITS" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Repository source changed within the last 24 hours; will build."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No source changes in the last 24 hours; skipping build."
          fi

  eas:
    name: EAS Build (${{ matrix.platform }})
    needs: check-for-changes
    if: (needs.check-for-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch') && (vars.USE_EAS_BUILDS == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [ios, android]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate Expo config
        run: npx expo config --type public

      - name: Build ${{ matrix.platform }} app with EAS
        run: eas build --platform ${{ matrix.platform }} --non-interactive --no-wait
