name: Lint and test

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

jobs:
  check-for-changes:
    name: Check for repository changes since last run
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine if repo changed in the last 24 hours
        id: check
        run: |
          LAST_COMMIT=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          AGE=$((NOW - LAST_COMMIT))
          SECONDS_IN_DAY=86400
          if [ "$AGE" -le "$SECONDS_IN_DAY" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Repository changed within the last 24 hours; will run checks."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in the last 24 hours; skipping checks."
          fi

  check:
    name: Static checks
    needs: check-for-changes
    if: needs.check-for-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Expo config
        run: npx expo config --type public

      - name: Parse JS files with Babel
        run: |
          node - <<'EOF'
          const babel = require('@babel/core');
          const fs = require('fs');
          const files = ['App.js', 'src/urlPolicy.js', 'babel.config.js'];
          for (const file of files) {
            const code = fs.readFileSync(file, 'utf8');
            babel.parseSync(code, {
              filename: file,
              presets: file.endsWith('.js') ? ['babel-preset-expo'] : undefined,
              babelrc: false,
              configFile: false,
            });
            console.log(`${file}: OK`);
          }
          EOF
