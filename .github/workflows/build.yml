name: Build iOS simulator and Android release AAB

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

jobs:
  check-for-changes:
    name: Check for repository changes since last run
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.bump.outputs.version }}
      commit: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine if repo source changed in the last 24 hours
        id: check
        run: |
          # Ignore automated version/metadata files and the remote allowlist when deciding
          # whether a real source change happened. The allowlist is fetched dynamically by
          # the app, so editing url-whitelist.json must not trigger a rebuild.
          RECENT_SOURCE_COMMITS=$(git log --since='24 hours ago' --format=%H -- . \
            ':!version.json' \
            ':!app.json' \
            ':!package.json' \
            ':!url-whitelist.json' \
            ':!src/whitelist/whitelist.json' \
            | wc -l)
          if [ "$RECENT_SOURCE_COMMITS" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Repository source changed within the last 24 hours; will build."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No source changes in the last 24 hours; skipping build."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version and bundle whitelist
        id: bump
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          npm run bump-version
          echo -n "version=" >> "$GITHUB_OUTPUT"
          node -p "require('./version.json').version" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        id: commit
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json app.json package.json src/whitelist/whitelist.json
          VERSION=$(node -p "require('./version.json').version")
          git diff --cached --quiet || git commit -m "Bump version to $VERSION [skip ci]"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android release AAB (version ${{ needs.check-for-changes.outputs.version }})
    needs: check-for-changes
    if: needs.check-for-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-for-changes.outputs.commit }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project
        run: npx expo prebuild --platform android

      - name: Decode release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_RELEASE_KEYSTORE_BASE64 secret is missing. The AAB will be debug-signed and rejected by Play Store."
            exit 1
          fi
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 -d > android/app/onlypostonx-release.keystore

      - name: Build release AAB
        env:
          ANDROID_RELEASE_STORE_FILE: ${{ github.workspace }}/android/app/onlypostonx-release.keystore
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Verify release signing
        run: |
          AAB=android/app/build/outputs/bundle/release/app-release.aab
          echo "Verifying $AAB is release-signed..."
          # Debug-signed AABs contain CERT.RSA/CERT.SF from the androiddebugkey.
          # Release-signed AABs use the configured alias and must not use CERT.*.
          if unzip -l "$AAB" | grep -qE 'META-INF/CERT\.(RSA|SF|DSA|EC)'; then
            echo "::error::AAB is debug-signed (found CERT.* signature files). Play Store will reject it."
            exit 1
          fi
          if ! unzip -l "$AAB" | grep -qE 'META-INF/.*\.(RSA|SF|DSA|EC)'; then
            echo "::error::AAB has no JAR signature files."
            exit 1
          fi
          # Print the certificate owner to prove it was signed by the release keystore.
          keytool -printcert -jarfile "$AAB" | head -30
          echo "AAB is signed in release mode."

      - name: Upload Android AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: android/app/build/outputs/bundle/release/*.aab

  build-ios-simulator:
    name: Build iOS simulator app (version ${{ needs.check-for-changes.outputs.version }})
    needs: check-for-changes
    if: needs.check-for-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-for-changes.outputs.commit }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios

      - name: Resolve iOS scheme name
        id: scheme
        run: |
          SCHEME=$(find ios -name '*.xcscheme' -not -path '*/Pods/*' | head -1 | xargs -I {} basename {} .xcscheme)
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Using scheme: $SCHEME"

      - name: Build iOS simulator binary
        run: |
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name '*.xcworkspace' | head -1)
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            \
            -sdk iphonesimulator \
            -derivedDataPath ../ios-derived-data \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Locate built simulator app
        id: locate
        run: |
          APP=$(find ios-derived-data -name '*.app' -type d | head -1)
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "Built app: $APP"

      - name: Upload iOS simulator app
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ${{ steps.locate.outputs.app }}
