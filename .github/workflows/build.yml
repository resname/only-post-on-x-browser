name: Build iOS simulator and Android release APK

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

jobs:
  check-for-changes:
    name: Check for repository changes since last run
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine if repo changed in the last 24 hours
        id: check
        run: |
          LAST_COMMIT=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          AGE=$((NOW - LAST_COMMIT))
          SECONDS_IN_DAY=86400
          if [ "$AGE" -le "$SECONDS_IN_DAY" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Repository changed within the last 24 hours; will build."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in the last 24 hours; skipping build."
          fi

  build-android:
    name: Build Android release APK
    needs: check-for-changes
    if: needs.check-for-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate build number
        run: npm run build-info

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project
        run: npx expo prebuild --platform android

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/*.apk

  build-ios-simulator:
    name: Build iOS simulator app
    needs: check-for-changes
    if: needs.check-for-changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate build number
        run: npm run build-info

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios

      - name: Resolve iOS scheme name
        id: scheme
        run: |
          SCHEME=$(find ios -name '*.xcscheme' -not -path '*/Pods/*' | head -1 | xargs -I {} basename {} .xcscheme)
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Using scheme: $SCHEME"

      - name: Build iOS simulator binary
        run: |
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name '*.xcworkspace' | head -1)
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -sdk iphonesimulator \
            -derivedDataPath ../ios-derived-data \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Locate built simulator app
        id: locate
        run: |
          APP=$(find ios-derived-data -name '*.app' -type d | head -1)
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "Built app: $APP"

      - name: Upload iOS simulator app
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ${{ steps.locate.outputs.app }}
