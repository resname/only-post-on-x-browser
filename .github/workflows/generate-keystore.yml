name: Generate release keystore

# One-time helper: creates a release keystore on a runner (which has keytool),
# base64-encodes it, and uploads it as a workflow artifact. The repository owner
# can then download the artifact, extract the .keystore file, and add it to
# GitHub Actions secrets. This file can be deleted after the keystore is stored.

on:
  workflow_dispatch:

jobs:
  generate:
    name: Generate release keystore
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Generate release keystore
        env:
          STORE_PASSWORD: onlypostonx
          KEY_PASSWORD: onlypostonx
          KEY_ALIAS: onlypostonx
        run: |
          keytool -genkey -v \
            -keystore onlypostonx-release.keystore \
            -alias "$KEY_ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=Only Post on X, OU=Release, O=OnlyPostOnX, L=Unknown, ST=Unknown, C=US"
          echo "Keystore generated:"
          ls -lh onlypostonx-release.keystore
          keytool -list -v -keystore onlypostonx-release.keystore -storepass "$STORE_PASSWORD" | head -20

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: onlypostonx-release-keystore
          path: onlypostonx-release.keystore
